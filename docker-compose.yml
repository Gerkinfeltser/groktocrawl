services:
  valkey:
    image: valkey/valkey:8-alpine
    restart: unless-stopped
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  searxng:
    image: searxng/searxng:latest
    restart: unless-stopped
    ports:
      - "8081:8080"
    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro
    environment:
      - SEARXNG_BASE_URL=http://localhost:8081/
    cap_add:
      - CAP_NET_BIND_SERVICE
    cap_drop:
      - ALL

  search-svc:
    build:
      context: ./search-svc
    restart: unless-stopped
    ports:
      - "8010:8010"
    profiles:
      - fixture
    # Fixture service — only starts when explicitly needed.
    # Production uses searxng instead.

  llm-svc:
    build:
      context: ./llm-svc
    restart: unless-stopped
    ports:
      - "8011:8011"
    profiles:
      - fixture

  test-site:
    build:
      context: ./test-site
    restart: unless-stopped
    ports:
      - "8005:8000"
    profiles:
      - fixture
    environment:
      - ENABLE_LLMS_TXT=1
      - ENABLE_MARKDOWN=1
      - ENABLE_DYNAMIC=1
      - SITE_NAME=Fixture Site

  scraper-svc:
    build:
      context: ./scraper-svc
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - LLM_BASE_URL=http://llm-svc:8011/v1
      - VALKEY_HOST=valkey
      - VALKEY_PORT=6379
      - VALKEY_DB=0

  browser-svc:
    build:
      context: ./browser-svc
    restart: unless-stopped

  flare-solverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    restart: unless-stopped
    ports:
      - "${FLARE_SOLVERR_PORT:-8191}:8191"
    environment:
      - LOG_LEVEL=${FLARE_SOLVERR_LOG_LEVEL:-info}
      - CAPTCHA_SOLVER=${FLARE_SOLVERR_CAPTCHA_SOLVER:-none}
    profiles:
      - flare-solverr

  semantic-svc:
    build:
      context: ./semantic-svc
    restart: unless-stopped
    ports:
      - "8003:8003"

  agent-svc:
    build:
      context: ./agent-svc
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      valkey:
        condition: service_healthy
      searxng:
        condition: service_started
      scraper-svc:
        condition: service_started
      semantic-svc:
        condition: service_started
    environment:
      - VALKEY_URL=${VALKEY_URL:-redis://valkey:6379/0}
      - SEARXNG_URL=${SEARXNG_URL:-http://searxng:8080}
      - SCRAPER_URL=${SCRAPER_URL:-http://scraper-svc:8001}
      - SEMANTIC_URL=${SEMANTIC_URL:-http://semantic-svc:8003}
      - HOST=0.0.0.0
      - PORT=8080

  ofelia:
    image: mcuadros/ofelia:latest
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./ofelia/config.ini:/etc/ofelia/config.ini:ro
    depends_on:
      - agent-svc

  portal-svc:
    build:
      context: ./portal-svc
    restart: unless-stopped
    ports:
      - "8082:8081"
    environment:
      - AGENT_BASE_URL=http://agent-svc:8080

  parse-svc:
    build:
      context: ./parse-svc
    restart: unless-stopped

volumes:
  valkey_data:
