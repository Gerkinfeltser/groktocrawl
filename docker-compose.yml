services:
  valkey:
    image: valkey/valkey:8-alpine
    restart: unless-stopped
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  slopsearx:
    image: ghcr.io/magnus919/slopsearx:latest
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      - ENGINE_BRAVE_API_KEY=${BRAVE_API_KEY}
      - VALKEY_URL=redis://valkey:6379/0
    healthcheck:
      test: ["CMD", "python", "/app/healthcheck.py"]
      interval: 30s
      timeout: 5s
      start_period: 5s
      retries: 3

  search-svc:
    build:
      context: .
      dockerfile: search-svc/Dockerfile
    restart: unless-stopped
    ports:
      - "8010:8010"
    profiles:
      - fixture
    # Fixture service — only starts when explicitly needed.
    # Production uses slopsearx instead.

  llm-svc:
    build:
      context: .
      dockerfile: llm-svc/Dockerfile
    restart: unless-stopped
    ports:
      - "8011:8011"
    profiles:
      - fixture

  test-site:
    build:
      context: ./test-site
    restart: unless-stopped
    ports:
      - "8005:8000"
    profiles:
      - fixture
    environment:
      - ENABLE_LLMS_TXT=1
      - ENABLE_MARKDOWN=1
      - ENABLE_DYNAMIC=1
      - SITE_NAME=Fixture Site

  tier3-fixture:
    build:
      context: ./test-site
    restart: unless-stopped
    ports:
      - "8006:8000"
    profiles:
      - fixture
    environment:
      - ENABLE_LLMS_TXT=0
      - ENABLE_MARKDOWN=0
      - ENABLE_DYNAMIC=1
      - SITE_NAME=Tier 3 Fixture

  scraper-svc:
    build:
      context: .
      dockerfile: scraper-svc/Dockerfile
    image: ghcr.io/groktopus/groktocrawl-scraper
    restart: unless-stopped
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      - LLM_BASE_URL=http://llm-svc:8011/v1
      - VALKEY_HOST=valkey
      - VALKEY_PORT=6379
      - VALKEY_DB=0

  browser-svc:
    build:
      context: .
      dockerfile: browser-svc/Dockerfile
    image: ghcr.io/groktopus/groktocrawl-browser
    restart: unless-stopped

  flare-solverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    restart: unless-stopped
    ports:
      - "${FLARE_SOLVERR_PORT:-8191}:8191"
    environment:
      - LOG_LEVEL=${FLARE_SOLVERR_LOG_LEVEL:-info}
      - CAPTCHA_SOLVER=${FLARE_SOLVERR_CAPTCHA_SOLVER:-none}
    profiles:
      - flare-solverr

  semantic-svc:
    build:
      context: .
      dockerfile: semantic-svc/Dockerfile
    image: ghcr.io/groktopus/groktocrawl-semantic
    restart: unless-stopped
    ports:
      - "8003:8003"
    environment:
      - QDRANT_URL=${QDRANT_URL:-http://qdrant:6333}
      - VECTOR_INDEX_MAX_DOCS=${VECTOR_INDEX_MAX_DOCS:-250000}
      - EMBED_MODEL_NAME=${EMBED_MODEL_NAME:-BAAI/bge-m3}
      - EMBED_DIM=${EMBED_DIM:-1024}
      - ACTIVE_EMBED_MODEL=${ACTIVE_EMBED_MODEL:-v_bge-m3}
    volumes:
      - hf-cache:/root/.cache/huggingface

  qdrant:
    image: qdrant/qdrant:v1.18.2
    platform: linux/amd64
    restart: unless-stopped
    mem_limit: 4g
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - MALLOC_CONF=retain:false

  agent-svc:
    build:
      context: .
      dockerfile: agent-svc/Dockerfile
    image: ghcr.io/groktopus/groktocrawl-agent
    restart: unless-stopped
    ports:
      - "${AGENT_PORT:-8080}:8080"
    env_file:
      - .env
    depends_on:
      valkey:
        condition: service_healthy
      slopsearx:
        condition: service_started
      scraper-svc:
        condition: service_started
      semantic-svc:
        condition: service_started
    environment:
      - VALKEY_URL=${VALKEY_URL:-redis://valkey:6379/0}
      - SEARXNG_URL=${SEARXNG_URL:-http://slopsearx:8080}
      - SCRAPER_URL=${SCRAPER_URL:-http://scraper-svc:8001}
      - SEMANTIC_URL=${SEMANTIC_URL:-http://semantic-svc:8003}
      - HOST=0.0.0.0
      - PORT=8080
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  ofelia:
    image: mcuadros/ofelia:latest
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./ofelia/config.ini:/etc/ofelia/config.ini:ro
    depends_on:
      - agent-svc

  portal-svc:
    build:
      context: .
      dockerfile: portal-svc/Dockerfile
    image: ghcr.io/groktopus/groktocrawl-portal
    restart: unless-stopped
    ports:
      - "8082:8081"
    environment:
      - AGENT_BASE_URL=http://agent-svc:8080

  parse-svc:
    build:
      context: .
      dockerfile: parse-svc/Dockerfile
    restart: unless-stopped

  mcp-svc:
    build:
      context: ./mcp-svc
    ports:
      - '${MCP_PORT:-8002}:8002'
    environment:
      - GROKTOCRAWL_URL=${GROKTOCRAWL_URL:-http://agent-svc:8000}
      - GROKTOCRAWL_API_KEY=${GROKTOCRAWL_API_KEY:-}
      - MCP_PORT=${MCP_PORT:-8002}
      - SESSION_TTL=${SESSION_TTL:-3600}
      - SESSION_SWEEP_INTERVAL=${SESSION_SWEEP_INTERVAL:-300}
      - HTTP_TIMEOUT=${HTTP_TIMEOUT:-60}
    depends_on:
      - agent-svc
    restart: unless-stopped

volumes:
  valkey_data:
  qdrant_data:
  hf-cache:
    external: true
