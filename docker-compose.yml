services:
  valkey:
    image: valkey/valkey:8-alpine
    restart: unless-stopped
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  search-svc:
    build:
      context: ./search-svc
    restart: unless-stopped
    ports:
      - "8010:8010"

  llm-svc:
    build:
      context: ./llm-svc
    restart: unless-stopped
    ports:
      - "8011:8011"

  test-site:
    build:
      context: ./test-site
    restart: unless-stopped
    ports:
      - "8005:8000"
    environment:
      - ENABLE_LLMS_TXT=1
      - ENABLE_MARKDOWN=1
      - ENABLE_DYNAMIC=1
      - SITE_NAME=Fixture Site

  scraper-svc:
    build:
      context: ./scraper-svc
    restart: unless-stopped
    ports:
      - "8001:8001"

  agent-svc:
    build:
      context: ./agent-svc
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      valkey:
        condition: service_healthy
      search-svc:
        condition: service_started
      llm-svc:
        condition: service_started
      scraper-svc:
        condition: service_started
    environment:
      # Internal wiring — override via .env only if running services externally
      - VALKEY_URL=${VALKEY_URL:-redis://valkey:6379/0}
      - SEARXNG_URL=${SEARXNG_URL:-http://search-svc:8010}
      - SCRAPER_URL=${SCRAPER_URL:-http://scraper-svc:8001}
      - HOST=0.0.0.0
      - PORT=8080

volumes:
  valkey_data:
