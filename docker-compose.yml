services:
  valkey:
    image: valkey/valkey:8-alpine
    restart: unless-stopped
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  searxng:
    image: searxng/searxng:latest
    restart: unless-stopped
    ports:
      - "8081:8080"
    volumes:
      - /Users/magnus/.hermes/searxng-settings.yml:/etc/searxng/settings.yml:ro
    environment:
      - SEARXNG_BASE_URL=http://localhost:8081/
    cap_add:
      - CAP_NET_BIND_SERVICE
    cap_drop:
      - ALL

  search-svc:
    build:
      context: ./search-svc
    restart: unless-stopped
    ports:
      - "8010:8010"
    profiles:
      - fixture
    # Fixture service — only starts when explicitly needed.
    # Production uses searxng instead.

  llm-svc:
    build:
      context: ./llm-svc
    restart: unless-stopped
    ports:
      - "8011:8011"
    profiles:
      - fixture

  test-site:
    build:
      context: ./test-site
    restart: unless-stopped
    ports:
      - "8005:8000"
    profiles:
      - fixture
    environment:
      - ENABLE_LLMS_TXT=1
      - ENABLE_MARKDOWN=1
      - ENABLE_DYNAMIC=1
      - SITE_NAME=Fixture Site

  scraper-svc:
    build:
      context: ./scraper-svc
    restart: unless-stopped
    ports:
      - "8001:8001"

  browser-svc:
    build:
      context: ./browser-svc
    restart: unless-stopped
    ports:
      - "8012:8012"

  agent-svc:
    build:
      context: ./agent-svc
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      valkey:
        condition: service_healthy
      searxng:
        condition: service_started
      scraper-svc:
        condition: service_started
    environment:
      - VALKEY_URL=${VALKEY_URL:-redis://valkey:6379/0}
      - SEARXNG_URL=${SEARXNG_URL:-http://searxng:8080}
      - SCRAPER_URL=${SCRAPER_URL:-http://scraper-svc:8001}
      - HOST=0.0.0.0
      - PORT=8080

  ofelia:
    image: mcuadros/ofelia:latest
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /Users/magnus/.hermes/ofelia-config.ini:/etc/ofelia/config.ini:ro
    depends_on:
      - agent-svc

volumes:
  valkey_data:
