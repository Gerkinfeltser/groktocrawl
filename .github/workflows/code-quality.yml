# Code Quality CI — dead code, unused deps, duplicate detection, type checking
#
# Runs vulture (dead code), deptry (unused dependencies), mypy (type checking),
# ruff (TODO/FIXME lint), jscpd (duplicate code), and gitleaks (secret scanning)
# on every PR and push to main.
#
# Python checks (vulture, deptry, mypy, ruff) share a single runner to avoid
# redundant setup overhead. jscpd (npm) and gitleaks (binary) use separate runners.

name: Code Quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-checks:
    name: Python Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install tooling
        run: pip install vulture deptry mypy ruff

      - name: Run vulture (dead code detection)
        run: |
          vulture . \
            --exclude ".venv,.venv-sys,htmlcov,graphify-out,droid-wiki,node_modules,dist,build,__pycache__,*.egg-info,.git" \
            --min-confidence 90

      - name: Run deptry per service (unused dependency detection)
        run: |
          for svc in agent-svc scraper-svc semantic-svc browser-svc parse-svc portal-svc; do
            echo "=== $svc ==="
            pip install -e "$svc" 2>/dev/null || true
            deptry "$svc" --per-rule-ignores '{"DEP002":["pytest","pytest-cov","pytest-xdist","httpx","vulture","deptry"]}' || true
          done

      - name: Run mypy (type checking)
        run: |
          PYTHONPATH=agent-svc:scraper-svc:llm-svc:parse-svc:portal-svc:browser-svc:. \
          mypy agent-svc/agent scraper-svc/scraper \
               llm-svc/llm_svc parse-svc/parse_svc portal-svc/portal \
               browser-svc/browser_svc semantic-svc common/

      - name: Run ruff TD check (TODO/FIXME enforcement)
        run: python3 -m ruff check --select TD

      - name: Validate observability artifacts
        run: python3 tests/service/test_observability_contract.py

  duplicate-code:
    name: Duplicate Code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install jscpd
        run: npm install -g jscpd
      - name: Run jscpd (duplicate code detection)
        run: |
          jscpd \
            --pattern "**/*.py" \
            --ignore ".venv,.venv-sys,htmlcov,graphify-out,droid-wiki,node_modules,dist,build,__pycache__,*.egg-info,.git,common,tests/**,**/tests/**" \
            --min-tokens 50 \
            --min-lines 5 \
            --threshold 15 \
            --reporters console \
            .

  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.24.0/gitleaks_8.24.0_linux_x64.tar.gz | tar -xz -C /usr/local/bin gitleaks
          gitleaks version
      - name: Run gitleaks (secret scanning)
        run: gitleaks detect --no-git --verbose --redact
