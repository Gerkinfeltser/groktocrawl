# Docker Build & Publish CI
#
# Builds and publishes Docker images for GroktoCrawl services to ghcr.io.
# Uses a build matrix with capped parallelism to avoid runner resource exhaustion.
#
# Tags:
#   - main branch → latest, unstable
#   - vX.Y.Z tag  → stable, X, X.Y, X.Y.Z
#   - PR to main  → build-only (no push)

name: Docker Build & Publish

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  REGISTRY_OWNER: groktopus

jobs:
  build-and-push:
    name: ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: agent-svc
            context: .
            dockerfile: agent-svc/Dockerfile
            image: ghcr.io/groktopus/groktocrawl-agent
          - service: scraper-svc
            context: .
            dockerfile: scraper-svc/Dockerfile
            image: ghcr.io/groktopus/groktocrawl-scraper
          - service: browser-svc
            context: .
            dockerfile: browser-svc/Dockerfile
            image: ghcr.io/groktopus/groktocrawl-browser
          - service: semantic-svc
            context: .
            dockerfile: semantic-svc/Dockerfile
            image: ghcr.io/groktopus/groktocrawl-semantic
          - service: portal-svc
            context: .
            dockerfile: portal-svc/Dockerfile
            image: ghcr.io/groktopus/groktocrawl-portal
      max-parallel: 2

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref_name == 'main' }}
            type=raw,value=unstable,enable=${{ github.ref_name == 'main' }}
            type=raw,value=stable,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{major}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{major}}.{{minor}}.{{patch}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{raw}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ github.ref_name }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: HF_TOKEN=${{ secrets.HF_TOKEN }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  integration-tests:
    name: Integration Tests
    needs: build-and-push
    runs-on: [self-hosted, groktocrawl, docker]
    steps:
      - uses: actions/checkout@v6

      - name: Set up .env
        run: |
          cp .env.sample .env
          echo "LLM_BASE_URL=http://llm-svc:8011/v1" >> .env
          echo "LLM_MODEL=fixture-model" >> .env

      - name: Force-remove all stale project containers
        run: docker ps -a --filter name=groktocrawl -q | xargs -r docker rm -f || true

      - name: Clean up stale containers from previous run
        run: docker compose down --remove-orphans --timeout 30 || true

      - name: Start the Docker stack
        run: docker compose up --build -d
        timeout-minutes: 10

      - name: Start test fixtures
        run: docker compose --profile fixture up --build -d llm-svc tier3-fixture test-site
        timeout-minutes: 5

      - name: Wait for services to be healthy
        run: |
          python3 -c "
          import time, urllib.request
          deadline = time.time() + 180
          while time.time() < deadline:
              try:
                  r = urllib.request.urlopen('http://localhost:8080/health', timeout=5)
                  if r.status == 200:
                      print('Stack healthy')
                      break
              except Exception:
                  pass
              time.sleep(3)
          else:
              raise RuntimeError('Timed out waiting for stack')
          "

      - name: Wait for semantic-svc
        run: |
          # First check from host that the API is alive
          python3 -c "
          import time, urllib.request, urllib.error
          deadline = time.time() + 120
          while time.time() < deadline:
              try:
                  r = urllib.request.urlopen('http://localhost:8003/health', timeout=5)
                  data = r.read().decode()
                  if r.status == 200 and '\"ok\"' in data:
                      print('semantic-svc healthy on host')
                      break
              except urllib.error.HTTPError as e:
                  print(f'  waiting ({e.code})...')
              except Exception:
                  pass
              time.sleep(3)
          else:
              raise RuntimeError('Timed out waiting for semantic-svc on host')
          "
          # Verify Qdrant is reachable from inside agent-svc (where tests run)
          python3 -c "
          import time, subprocess
          deadline = time.time() + 60
          while time.time() < deadline:
              r = subprocess.run(
                  ['docker', 'compose', 'exec', '-T', 'agent-svc',
                   'python3', '-c',
                   'import urllib.request; u=urllib.request.urlopen(\"http://semantic-svc:8003/index/stats\", timeout=5); print(u.status)'],
                  capture_output=True, text=True, timeout=10
              )
              if r.returncode == 0 and '200' in r.stdout:
                  print(f'Qdrant ready from agent-svc')
                  break
              print(f'  waiting from agent-svc (rc={r.returncode}): {r.stdout[:80]}')
              time.sleep(5)
          else:
              raise RuntimeError('Timed out waiting for Qdrant from agent-svc')
          "

      - name: Wait for tier3-fixture
        run: |
          python3 -c "
          import time, urllib.request
          deadline = time.time() + 30
          while time.time() < deadline:
              try:
                  r = urllib.request.urlopen('http://localhost:8006/health', timeout=5)
                  if r.status == 200:
                      print('tier3-fixture healthy')
                      break
              except Exception:
                  pass
              time.sleep(2)
          else:
              raise RuntimeError('Timed out waiting for tier3-fixture')
          "

      - name: Wait for test-site
        run: |
          python3 -c "
          import time, urllib.request
          deadline = time.time() + 60
          while time.time() < deadline:
              try:
                  r = urllib.request.urlopen('http://localhost:8005/health', timeout=5)
                  if r.status == 200:
                      print('test-site healthy')
                      break
              except Exception:
                  pass
              time.sleep(2)
          else:
              raise RuntimeError('Timed out waiting for test-site')
          "

      - name: Copy test files and source directories
        run: |
          svc=$(docker compose ps -q agent-svc)
          # Copy full tests/ directory
          docker compose exec -T agent-svc mkdir -p /app/tests
          docker cp tests/. "$svc":/app/tests/
          # Copy service source packages so tests can import them
          # Each package_dir (e.g. scraper-svc/scraper) becomes /app/<package_dir>/
          for pkg in scraper-svc/scraper parse-svc/parse_svc portal-svc/portal browser-svc/browser_svc search-svc/search_svc llm-svc/llm_svc; do
            docker compose exec -T agent-svc mkdir -p "/app/$pkg"
            docker cp "$pkg/." "$svc:/app/$pkg/"
          done

      - name: Run integration tests
        run: |
          docker compose exec -T agent-svc pip install pytest pytest-timeout -q
          docker compose exec -T \
            -e PYTHONPATH=/app/agent-svc:/app/scraper-svc:/app/search-svc:/app/llm-svc:/app/parse-svc:/app/portal-svc:/app/browser-svc:/app \
            -e SCRAPER_BASE_URL=http://scraper-svc:8001 \
            -e SEARCH_BASE_URL=http://slopsearx:8080 \
            -e LLM_BASE_URL=http://llm-svc:8011 \
            -e TEST_SITE_BASE_URL=http://test-site:8000 \
            -e TIER3_FIXTURE_BASE_URL=http://tier3-fixture:8000 \
            -e SEMANTIC_BASE_URL=http://semantic-svc:8003 \
            agent-svc python3 -m pytest /app/tests/ -x --timeout=120 --ignore-glob='*unit*' --ignore-glob='*observability*'
          docker compose exec -T \
            -e PYTHONPATH=/app/agent-svc:/app/scraper-svc:/app/search-svc:/app/llm-svc:/app/parse-svc:/app/portal-svc:/app/browser-svc:/app \
            -e SCRAPER_BASE_URL=http://scraper-svc:8001 \
            -e SEARCH_BASE_URL=http://slopsearx:8080 \
            -e LLM_BASE_URL=http://llm-svc:8011 \
            -e TEST_SITE_BASE_URL=http://test-site:8000 \
            -e TIER3_FIXTURE_BASE_URL=http://tier3-fixture:8000 \
            -e SEMANTIC_BASE_URL=http://semantic-svc:8003 \
            agent-svc python3 -m pytest /app/tests/ -x --timeout=120
        timeout-minutes: 15

      - name: Collect logs on failure
        if: failure()
        run: docker compose logs --tail 50

      - name: Tear down stack
        if: always()
        run: docker compose down --remove-orphans --timeout 30
