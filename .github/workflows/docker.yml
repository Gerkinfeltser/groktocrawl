# Docker Build & Publish CI
#
# Builds and publishes Docker images for GroktoCrawl services to ghcr.io.
# Uses a build matrix with capped parallelism to avoid runner resource exhaustion.
#
# Tags:
#   - main branch → latest, unstable
#   - vX.Y.Z tag  → stable, X, X.Y, X.Y.Z
#   - PR to main  → build-only (no push)

name: Docker Build & Publish

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  REGISTRY_OWNER: groktopus

jobs:
  build-and-push:
    name: ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: agent-svc
            context: ./agent-svc
            dockerfile: agent-svc/Dockerfile
            image: ghcr.io/groktopus/groktocrawl-agent
          - service: scraper-svc
            context: ./scraper-svc
            dockerfile: scraper-svc/Dockerfile
            image: ghcr.io/groktopus/groktocrawl-scraper
          - service: browser-svc
            context: ./browser-svc
            dockerfile: browser-svc/Dockerfile
            image: ghcr.io/groktopus/groktocrawl-browser
          - service: semantic-svc
            context: ./semantic-svc
            dockerfile: semantic-svc/Dockerfile
            image: ghcr.io/groktopus/groktocrawl-semantic
          - service: portal-svc
            context: ./portal-svc
            dockerfile: portal-svc/Dockerfile
            image: ghcr.io/groktopus/groktocrawl-portal
      max-parallel: 2

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref_name == 'main' }}
            type=raw,value=unstable,enable=${{ github.ref_name == 'main' }}
            type=raw,value=stable,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{major}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{major}}.{{minor}}.{{patch}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{raw}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ github.ref_name }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  integration-tests:
    name: Integration Tests
    needs: build-and-push
    runs-on: [self-hosted, groktocrawl, docker]
    steps:
      - uses: actions/checkout@v4

      - name: Set up .env
        run: cp .env.sample .env

      - name: Start the Docker stack
        run: docker compose up --build -d
        timeout-minutes: 10

      - name: Wait for services to be healthy
        run: |
          python3 -c "
          import time, httpx
          deadline = time.time() + 180
          while time.time() < deadline:
              try:
                  r = httpx.get('http://localhost:8080/health', timeout=5)
                  if r.status_code == 200:
                      print('Stack healthy')
                      break
              except Exception:
                  pass
              time.sleep(3)
          else:
              raise RuntimeError('Timed out waiting for stack')
          "

      - name: Run integration tests
        run: |
          docker compose exec -T agent-svc mkdir -p /app/tests
          docker cp tests/test_stack.py $(docker compose ps -q agent-svc):/app/tests/test_stack.py
          docker compose exec -T agent-svc python3 /app/tests/test_stack.py
        timeout-minutes: 10

      - name: Collect logs on failure
        if: failure()
        run: docker compose logs --tail 50
