# Architecture-as-Code CI
#
# Validates Architecture Decision Records (ADRs), C4 diagrams, and other
# architecture documentation on every push and PR to main.
#
# Convention:
# - ADRs live in docs/adr/ with NNNN-title.md naming
# - Architecture diagrams in docs/architecture.md
# - Model files (if any) in model/

name: Architecture CI

on:
  push:
    branches: [main]
    paths:
      - "docs/adr/**"
      - "docs/architecture.md"
      - "model/**"
  pull_request:
    branches: [main]
    paths:
      - "docs/adr/**"
      - "docs/architecture.md"
      - "model/**"

jobs:
  validate-adrs:
    name: Validate ADR Structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Check ADR file naming convention
        run: |
          echo "Checking ADR naming: NNNN-title-with-dashes.md"
          errors=0
          for f in docs/adr/[0-9]*.md; do
            basename=$(basename "$f")
            if ! echo "$basename" | grep -qE '^[0-9]{4}-[a-z0-9-]+\.md$'; then
              echo "❌ INVALID: $basename (must be NNNN-title-with-dashes.md)"
              errors=$((errors+1))
            fi
          done
          if [ "$errors" -gt 0 ]; then
            echo "Found $errors ADR naming violations"
            exit 1
          fi
          echo "✅ All ADR filenames valid"

      - name: Check ADR frontmatter has required fields
        run: |
          echo "Checking ADR frontmatter for Status, Context, Decision, Consequences"
          errors=0
          for f in docs/adr/[0-9]*.md; do
            basename=$(basename "$f")
            content=$(cat "$f")
            if ! echo "$content" | grep -q "^# "; then
              echo "❌ MISSING TITLE: $basename"
              errors=$((errors+1))
            fi
            if ! echo "$content" | grep -qiE "^#{1,2} Context"; then
              echo "❌ MISSING '## Context' or '# Context': $basename"
              errors=$((errors+1))
            fi
            # Accept "## Decision" or "## Decision Outcome" or "### Decision"
            if ! echo "$content" | grep -qiE "^#{1,2} Decision"; then
              echo "❌ MISSING '## Decision' section: $basename"
              errors=$((errors+1))
            fi
            # Accept "## Consequences" or "### Consequences" or "### Positive/Negative Consequences"
            if ! echo "$content" | grep -qiE "^#{2,3} (Positive |Negative )?Consequences"; then
              echo "❌ MISSING Consequences section: $basename"
              errors=$((errors+1))
            fi
          done
          if [ "$errors" -gt 0 ]; then
            echo "Found $errors ADR structure violations"
            exit 1
          fi
          echo "✅ All ADRs have required sections"

      - name: Check ADR index is up to date
        run: |
          echo "Checking ADR index includes all ADR files"
          adr_files=$(ls docs/adr/[0-9]*.md 2>/dev/null | wc -l)
          indexed=$(grep -c "ADR 00" docs/adr/README.md 2>/dev/null || echo 0)
          echo "ADR files on disk: $adr_files"
          echo "ADRs indexed in README: $indexed"
          if [ "$adr_files" -ne "$indexed" ]; then
            echo "⚠️  ADR count mismatch — index may be stale"
            echo "   Expected $adr_files, found $indexed in README"
          fi

  validate-diagrams:
    name: Validate C4 Diagrams
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Check architecture.md exists
        run: |
          if [ -f docs/architecture.md ]; then
            echo "✅ docs/architecture.md found"
            # Basic check: at least one mermaid block
            if grep -q '```mermaid' docs/architecture.md; then
              echo "✅ Contains Mermaid diagrams"
            else
              echo "⚠️ No Mermaid blocks found in architecture.md"
            fi
          else
            echo "⚠️ docs/architecture.md not found (optional)"
          fi
