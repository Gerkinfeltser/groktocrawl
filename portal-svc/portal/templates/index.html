<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GroktoCrawl</title>
<script src="https://cdn.jsdelivr.net/npm/marked@15.0.7/marked.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0f0f0f;
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .container {
    max-width: 720px;
    margin: 0 auto;
    padding: 0 16px;
    width: 100%;
  }

  /* ── Hero area (search state) ── */
  .hero {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
    padding: 40px 0;
  }
  .hero.has-results {
    flex: 0;
    padding: 24px 0 16px;
  }

  .logo {
    font-size: 2rem;
    font-weight: 700;
    letter-spacing: -0.5px;
    margin-bottom: 8px;
    color: #fff;
  }
  .logo span { color: #6b8cff; }
  .hero.has-results .logo { font-size: 1.4rem; margin-bottom: 4px; }
  .tagline { color: #888; margin-bottom: 24px; font-size: 0.9rem; }
  .hero.has-results .tagline { display: none; }

  /* ── Search bar ── */
  .search-form {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }
  .search-row {
    width: 100%;
    display: flex;
    gap: 8px;
  }
  .search-row input {
    flex: 1;
    padding: 12px 16px;
    border: 1px solid #333;
    border-radius: 8px;
    background: #1a1a1a;
    color: #e0e0e0;
    font-size: 1rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-row input:focus { border-color: #6b8cff; }
  .search-row input::placeholder { color: #555; }

  .btn-group { display: flex; gap: 8px; width: 100%; justify-content: center; }

  .btn {
    padding: 10px 24px;
    border: none;
    border-radius: 8px;
    font-size: 0.95rem;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn:hover { filter: brightness(1.15); }

  .btn-primary {
    background: #6b8cff;
    color: #fff;
  }
  .btn-primary:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    filter: none;
  }

  .btn-secondary {
    background: #2a2a2a;
    color: #888;
    border: 1px solid #333;
  }
  .btn-secondary:hover { color: #ccc; border-color: #555; }

  .btn-deep {
    background: transparent;
    color: #555;
    cursor: default;
    position: relative;
  }

  .btn-deep-hint {
    font-size: 0.7rem;
    color: #444;
    text-align: center;
    margin-top: -4px;
  }

  /* ── Spinner ── */
  .spinner { display: none; }
  .spinner.active { display: inline-block; width: 16px; height: 16px; border: 2px solid #333; border-top-color: #6b8cff; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 8px; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Results area ── */
  .results { display: none; width: 100%; margin-top: 16px; }
  .results.active { display: block; }

  .answer-area {
    background: #1a1a1a;
    border-radius: 8px;
    padding: 16px;
    min-height: 60px;
    line-height: 1.7;
    font-size: 0.95rem;
  }
  .answer-area p { margin-bottom: 0.6em; }
  .answer-area p:last-child { margin-bottom: 0; }
  .answer-area strong { color: #fff; font-weight: 600; }
  .answer-area code {
    background: #2a2a2a;
    padding: 1px 5px;
    border-radius: 3px;
    font-size: 0.85em;
    color: #c9a0ff;
  }
  .answer-area a { color: #6b8cff; text-decoration: none; }
  .answer-area a:hover { text-decoration: underline; }
  .answer-area ul, .answer-area ol { margin: 0.4em 0; padding-left: 1.5em; }
  .answer-area li { margin-bottom: 0.2em; }
  .answer-area table {
    border-collapse: collapse;
    width: 100%;
    margin: 0.6em 0;
    font-size: 0.85rem;
  }
  .answer-area th, .answer-area td {
    border: 1px solid #333;
    padding: 6px 10px;
    text-align: left;
  }
  .answer-area th {
    background: #2a2a2a;
    color: #fff;
    font-weight: 600;
  }
  .answer-area td {
    background: #1a1a1a;
  }
  .answer-area tr:nth-child(even) td {
    background: #222;
  }
  .answer-area .cursor { animation: blink 1s step-end infinite; }
  @keyframes blink { 50% { opacity: 0; } }
  .answer-area .citation { color: #6b8cff; font-size: 0.8rem; cursor: pointer; text-decoration: none; }
  .answer-area .citation:hover { text-decoration: underline; }

  .sources-panel {
    margin-top: 8px;
  }
  .sources-panel h3 {
    font-size: 0.8rem;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }
  .source-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 10px;
    background: #1a1a1a;
    border-radius: 6px;
    margin-bottom: 4px;
    font-size: 0.85rem;
  }
  .source-item .status { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .source-item .status.loading { background: #555; }
  .source-item .status.done { background: #4caf50; }
  .source-item .status.error { background: #f44336; }
  .source-item a { color: #6b8cff; text-decoration: none; }
  .source-item a:hover { text-decoration: underline; }

  .recent-queries {
    margin-top: 20px;
    display: none;
  }
  .recent-queries.active { display: block; }
  .recent-queries h3 {
    font-size: 0.8rem;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }
  .recent-item {
    display: inline-block;
    padding: 4px 12px;
    background: #1a1a1a;
    border-radius: 16px;
    font-size: 0.85rem;
    color: #888;
    cursor: pointer;
    margin: 0 4px 6px 0;
    transition: all 0.15s;
  }
  .recent-item:hover { background: #2a2a2a; color: #ccc; }

  /* ── Mobile responsive ── */
  @media (max-width: 480px) {
    .search-row { flex-direction: column; }
    .btn-group { flex-wrap: wrap; }
    .btn { width: 100%; text-align: center; }
    .hero.has-results .logo { font-size: 1.2rem; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="hero" id="hero">
    <div class="logo">Grokto<span>Crawl</span></div>
    <div class="tagline">Self-hosted AI research. Ask anything.</div>
    <form class="search-form" id="searchForm" autocomplete="off">
      <div class="search-row">
        <input type="text" id="queryInput" placeholder="Ask anything..." autofocus>
      </div>
      <div class="btn-group">
        <button type="submit" class="btn btn-primary" id="askBtn">
          <span class="spinner" id="spinner"></span>
          <span id="askBtnText">Ask</span>
        </button>
        <button type="button" class="btn btn-secondary" id="deepBtn">Deep Research</button>
      </div>
    </form>
  </div>

  <div class="results" id="results">
    <div class="answer-area" id="answerArea">
      <span class="cursor">|</span>
    </div>
    <div class="sources-panel" id="sourcesPanel">
      <h3>Sources</h3>
      <div id="sourcesList"></div>
    </div>
    <div id="phaseIndicator" style="display:none; font-size:0.8rem; color:#888; margin-top:8px;"></div>
  </div>

  <div class="recent-queries" id="recentQueries">
    <h3>Recent queries</h3>
    <div id="recentList"></div>
  </div>
</div>

<script>
(function() {
  const LS_KEY = 'groktocrawl_recent';
  const MAX_RECENT = 10;

  const form = document.getElementById('searchForm');
  const input = document.getElementById('queryInput');
  const askBtn = document.getElementById('askBtn');
  const askBtnText = document.getElementById('askBtnText');
  const spinner = document.getElementById('spinner');
  const deepBtn = document.getElementById('deepBtn');
  const hero = document.getElementById('hero');
  const results = document.getElementById('results');
  const sourcesList = document.getElementById('sourcesList');
  const answerArea = document.getElementById('answerArea');
  const recentQueries = document.getElementById('recentQueries');
  const recentList = document.getElementById('recentList');
  const phaseIndicator = document.getElementById('phaseIndicator');

  let currentCitations = {};
  let fullAnswerText = '';
  let mode = 'ask';  // 'ask' or 'deep'

  // ── Markdown renderer (uses marked library) ──
  function renderMarkdown(text) {
    // Render full markdown to HTML
    let html = marked.parse(text, { breaks: true, gfm: true });

    // Citation markers [N] — link to sources (post-marked so they survive parsing)
    html = html.replace(/\[(\d+)\]/g, (match, idx) => {
      const url = currentCitations[idx];
      if (url) return `<a href="${url}" class="citation" target="_blank">[${idx}]</a>`;
      return match;
    });

    return html;
  }

  // ── Recent queries ──
  function loadRecent() {
    try { return JSON.parse(localStorage.getItem(LS_KEY) || '[]'); }
    catch { return []; }
  }

  function saveRecent(query) {
    const list = loadRecent().filter(q => q !== query);
    list.unshift(query);
    if (list.length > MAX_RECENT) list.length = MAX_RECENT;
    localStorage.setItem(LS_KEY, JSON.stringify(list));
  }

  function renderRecent() {
    const list = loadRecent();
    if (list.length === 0) { recentQueries.classList.remove('active'); return; }
    recentQueries.classList.add('active');
    recentList.innerHTML = list.map(q =>
      `<span class="recent-item" data-q="${q.replace(/"/g, '&quot;')}">${q}</span>`
    ).join('');
    recentList.querySelectorAll('.recent-item').forEach(el => {
      el.addEventListener('click', () => {
        input.value = el.dataset.q;
        form.dispatchEvent(new Event('submit'));
      });
    });
  }

  // ── SSE parser ──
  async function handleStream(response) {
    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });

      const lines = buffer.split('\n');
      buffer = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const raw = line.slice(6).trim();
        if (raw === '[DONE]') continue;

        try {
          const event = JSON.parse(raw);
          handleEvent(event);
        } catch (e) {
          buffer = line + '\n' + buffer;
        }
      }
    }
  }

  function handleEvent(event) {
    switch (event.type) {
      case 'research_plan':
        phaseIndicator.style.display = 'block';
        phaseIndicator.textContent = event.strategy || event.reasoning || 'Planning research...';
        break;
      case 'status':
        phaseIndicator.style.display = 'block';
        if (event.state === 'planning') phaseIndicator.textContent = 'Planning...';
        else if (event.state === 'searching') phaseIndicator.textContent = 'Searching...';
        else if (event.state === 'synthesizing') phaseIndicator.textContent = 'Synthesizing...';
        break;
      case 'research_pass':
        phaseIndicator.style.display = 'block';
        phaseIndicator.textContent = `Pass ${event.pass}/${event.total_passes}`;
        break;
      case 'sources_pending':
        renderSources(event.sources);
        break;
      case 'source_scraped':
        updateSourceStatus(event.url, 'done');
        break;
      case 'sources':
        // Agent sends sources at end; only render if sources_pending wasn't already sent
        if (sourcesList.children.length === 0) {
          // Build source objects from URL list
          const srcObjs = event.sources.map(url => ({ url, title: url, relevance: '' }));
          renderSources(srcObjs);
        }
        break;
      case 'token':
        appendToken(event.content);
        break;
      case 'done':
        finishAnswer(event);
        break;
      case 'error':
        showError(event.content);
        break;
    }
  }

  function renderSources(sources) {
    sourcesList.innerHTML = '';
    sources.forEach((s, i) => {
      const el = document.createElement('div');
      el.className = 'source-item';
      el.id = `src-${i}`;
      el.setAttribute('data-url', s.url);
      el.innerHTML = `
        <span class="status loading"></span>
        <a href="${s.url}" target="_blank" rel="noopener">${s.title || s.url}</a>
      `;
      sourcesList.appendChild(el);
    });
  }

  function updateSourceStatus(url, statusClass) {
    const item = sourcesList.querySelector(`.source-item[data-url="${url}"]`);
    if (item) {
      const statusDot = item.querySelector('.status');
      if (statusDot) statusDot.className = `status ${statusClass}`;
    }
  }

  function appendToken(content) {
    fullAnswerText += content;
    const cursorSpan = answerArea.querySelector('.cursor');
    if (cursorSpan) {
      cursorSpan.insertAdjacentText('beforebegin', content);
    } else {
      answerArea.insertAdjacentText('beforeend', content);
    }
  }

  function finishAnswer(event) {
    // If we have the full answer in the done event, use that
    if (event.answer) {
      fullAnswerText = event.answer;
    } else if (event.result) {
      // Agent endpoint format: result instead of answer
      fullAnswerText = event.result;
    }

    // Build citation lookup
    currentCitations = {};
    if (event.citations) {
      // Answer endpoint format: citations is array of {index, url}
      event.citations.forEach(c => { currentCitations[c.index] = c.url; });
    } else if (event.sources) {
      // Agent endpoint format: sources is array of URL strings
      event.sources.forEach((url, i) => { currentCitations[String(i + 1)] = url; });
    }

    // Render markdown to HTML
    answerArea.innerHTML = renderMarkdown(fullAnswerText);

    // Mark sources as done
    const items = sourcesList.querySelectorAll('.status');
    items.forEach(el => { el.className = 'status done'; });

    setLoading(false);
  }

  function showError(content) {
    answerArea.innerHTML = `<span style="color: #f44336;">Error: ${content}</span>`;
    setLoading(false);
  }

  function setLoading(loading) {
    if (loading) {
      askBtn.disabled = true;
      deepBtn.disabled = true;
      spinner.classList.add('active');
      askBtnText.textContent = mode === 'deep' ? 'Researching...' : 'Searching...';
    } else {
      askBtn.disabled = false;
      deepBtn.disabled = false;
      spinner.classList.remove('active');
      askBtnText.textContent = 'Ask';
    }
  }

  // ── Form submit ──
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const query = input.value.trim();
    if (!query) return;

    hero.classList.add('has-results');
    results.classList.add('active');
    sourcesList.innerHTML = '';
    fullAnswerText = '';
    answerArea.innerHTML = '<span class="cursor">|</span>';
    phaseIndicator.style.display = 'none';
    phaseIndicator.textContent = '';
    setLoading(true);

    saveRecent(query);
    renderRecent();

    const formData = new FormData();
    formData.append('query', query);
    if (mode === 'ask') {
      formData.append('num_sources', '5');
    }

    const url = mode === 'deep' ? '/ask/deep' : '/ask';

    try {
      const response = await fetch(url, { method: 'POST', body: formData });
      if (!response.ok) {
        showError(`Server returned ${response.status}`);
        return;
      }
      await handleStream(response);
    } catch (err) {
      showError(err.message);
    }
  });

  // ── Button click handlers ──
  // Ask button is type="submit", so clicking it or pressing Enter triggers form submit natively.
  // Only Deep Research needs a manual click handler since it's type="button".
  deepBtn.addEventListener('click', () => {
    mode = 'deep';
    form.dispatchEvent(new Event('submit'));
  });

  // ── Init ──
  renderRecent();
  input.focus();
})();
</script>
</body>
</html>
